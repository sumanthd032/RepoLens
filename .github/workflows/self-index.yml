name: Self-index smoke test

on:
  schedule:
    - cron: "0 0 * * *" # nightly at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-index:
    name: Index RepoLens and verify grounding
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev

      - name: Index self and ask a smoke-test question
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REPOLENS_DATA_DIR: ${{ runner.temp }}/repolens-data
        run: uv run python scripts/smoke_self_index.py
