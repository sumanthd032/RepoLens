name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # mint the OIDC token for PyPI Trusted Publishing

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # Build the SPA and bake it into the package before building the wheel.
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Copy frontend into package
        run: bash scripts/build.sh

      - name: Build wheel and sdist
        run: uv build

      # Trusted Publishing: uv mints an OIDC token from the id-token permission above, so no
      # API token secret is needed. Requires a matching trusted publisher configured on PyPI
      # (owner: sumanthd032, repo: RepoLens, workflow: release.yml).
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
