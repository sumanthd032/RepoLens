# RepoLens — single service, single port. Mounts a named volume for index persistence
# (vectors, BM25, symbol graph, metadata, and the local model cache) across restarts.

services:
  repolens:
    build:
      context: .
      dockerfile: Dockerfile
    image: repolens:latest
    ports:
      - "8000:8000"
    volumes:
      - repolens-data:/data
    environment:
      - REPOLENS_DATA_DIR=/data
      - REPOLENS_LOG_LEVEL=INFO
      # Default backend is Groq (free). Provide a key via .env or the host environment.
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped

volumes:
  repolens-data:
